name: Build macOS application

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-macos.yml"
      - "packaging/pdf_workbench_macos.spec"
      - "src/**"
      - "pyproject.toml"
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            architecture: arm64
            artifact_name: pdf-workbench-macos-arm64
            archive_name: PDF-Workbench-macOS-arm64.zip
          - runner: macos-15-intel
            architecture: x86_64
            artifact_name: pdf-workbench-macos-x86_64
            archive_name: PDF-Workbench-macOS-x86_64.zip
    runs-on: ${{ matrix.runner }}
    env:
      PR_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Set build metadata
        shell: bash
        run: |
          set -euo pipefail

          short_sha="${PR_SOURCE_SHA::7}"
          echo "SHORT_SHA=$short_sha" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=PDF-Workbench-macOS-${{ matrix.architecture }}-$short_sha.zip" >> "$GITHUB_ENV"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/pdf_workbench
      - run: pytest --cov=pdf_workbench
        env:
          QT_QPA_PLATFORM: offscreen
      - name: Build macOS app
        run: pyinstaller packaging/pdf_workbench_macos.spec --noconfirm --clean
      - name: Verify app bundle structure
        shell: bash
        run: |
          set -euo pipefail

          find "dist/PDF Workbench.app/Contents" -maxdepth 3 -type d -print
          find "dist/PDF Workbench.app/Contents" -maxdepth 3 -type f -print | head -200
          du -sh "dist/PDF Workbench.app"
          find "dist/PDF Workbench.app" \( -name "*.dylib" -o -name "*.so" \) -print
          otool -L "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench"
          test -d "dist/PDF Workbench.app"
          test -f "dist/PDF Workbench.app/Contents/Info.plist"
          test -x "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench"
          find "dist/PDF Workbench.app/Contents" -maxdepth 2 -type d | grep -Eq '/(Frameworks|MacOS|Resources)$'
      - name: Verify bundled theme resources
        shell: bash
        run: |
          set -euo pipefail

          find "dist/PDF Workbench.app" -name "bootstrap_*.qss" -print
          find "dist/PDF Workbench.app" -name "bootstrap_light.qss" -print -quit | grep -q .
          find "dist/PDF Workbench.app" -name "bootstrap_dark.qss" -print -quit | grep -q .
      - name: Verify app architecture
        shell: bash
        run: |
          set -euo pipefail
          actual_architecture=$(uname -m)
          file "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench"
          lipo -archs "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench"
          case "${{ matrix.architecture }}" in
            arm64)
              test "$actual_architecture" = "arm64"
              lipo -archs "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench" | grep -q 'arm64'
              ;;
            x86_64)
              test "$actual_architecture" = "x86_64"
              lipo -archs "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench" | grep -q 'x86_64'
              ;;
            *)
              echo "Unsupported architecture: ${{ matrix.architecture }}"
              exit 1
              ;;
          esac
      - name: Smoke test CLI version
        shell: bash
        run: |
          set -euo pipefail

          executable="dist/PDF Workbench.app/Contents/MacOS/PDF Workbench"
          expected_version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')

          "$executable" --version 2>&1 | tee cli-smoke-test.log
          grep -F "$expected_version" cli-smoke-test.log
      - name: Smoke test GUI launch
        shell: bash
        run: |
          set -euo pipefail

          executable="dist/PDF Workbench.app/Contents/MacOS/PDF Workbench"
          input_pdf="$PWD/tests/fixtures/real-search-english.pdf"
          stdout_log="gui-stdout.log"
          stderr_log="gui-stderr.log"
          copied_app_log="gui-app.log"
          screenshot_path="gui-search.png"
          ui_state_path="gui-search-state.json"
          app_log_path=$(python - <<'PY'
          from platformdirs import user_log_dir
          from pathlib import Path

          print(Path(user_log_dir("PDF Workbench", "m0ka-Lv98")) / "pdf-workbench.log")
          PY
          )

          rm -f "$stdout_log" "$stderr_log" "$copied_app_log" "$screenshot_path" "$ui_state_path" "$app_log_path"

          APP_EXIT_CODE=$(PDF_WORKBENCH_BUILD_SHA="$SHORT_SHA" \
            python - <<'PY'
          import os
          import subprocess
          import sys

          command = [
              "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench",
              os.path.join(os.getcwd(), "tests/fixtures/real-search-english.pdf"),
              "--open-search",
              "--search-query",
              "Alpha",
              "--expected-search-count",
              "2",
              "--screenshot-path",
              "gui-search.png",
              "--ui-state-path",
              "gui-search-state.json",
          ]
          environment = os.environ.copy()
          with open("gui-stdout.log", "w", encoding="utf-8") as stdout, open(
              "gui-stderr.log", "w", encoding="utf-8"
          ) as stderr:
              try:
                  completed = subprocess.run(
                      command,
                      stdout=stdout,
                      stderr=stderr,
                      timeout=20,
                      check=False,
                      env=environment,
                  )
              except subprocess.TimeoutExpired:
                  print("124")
                  raise SystemExit(0)
          print(str(completed.returncode))
          PY
          )
          app_exit_code="$APP_EXIT_CODE"

          echo "App log path: $app_log_path"
          echo "App exit code: $app_exit_code"
          echo "=== STDOUT ==="
          test -f "$stdout_log" && cat "$stdout_log" || true
          echo "=== STDERR ==="
          test -f "$stderr_log" && cat "$stderr_log" || true
          echo "=== APP LOG ==="
          test -f "$app_log_path" && cat "$app_log_path" || true
          echo "=== SCREENSHOT ==="
          test -f "$screenshot_path" && ls -l "$screenshot_path" || true
          echo "=== UI STATE JSON ==="
          test -f "$ui_state_path" && cat "$ui_state_path" || true
          if test -f "$app_log_path"; then
            cp "$app_log_path" "$copied_app_log"
          else
            : > "$copied_app_log"
          fi

          if [ "$app_exit_code" = "124" ]; then
            echo "GUI process timed out before completing startup diagnostics."
            exit 1
          fi

          test -f "$screenshot_path"
          test -f "$ui_state_path"
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("gui-search-state.json").read_text(encoding="utf-8"))

          assert payload["search_toolbar_visible"] is True
          assert payload["search_bar_visible"] is True
          assert payload["search_input_visible"] is True
          assert payload["search_input_focused"] is True
          assert payload["query"] == "Alpha"
          assert payload["current_index"] == 1
          assert payload["total_count"] == 2

          for key in (
              "search_toolbar_geometry",
              "search_bar_geometry",
              "search_input_geometry",
          ):
              geometry = payload[key]
              assert isinstance(geometry, list) and len(geometry) == 4
              assert geometry[2] > 0
              assert geometry[3] > 0
          PY
          test "$app_exit_code" -eq 0
      - name: Verify codesign
        shell: bash
        run: |
          set -euo pipefail

          codesign --verify --deep --strict --verbose=2 "dist/PDF Workbench.app"
          codesign -dv --verbose=4 "dist/PDF Workbench.app"
      - name: Package app bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/PDF Workbench.app" \
            "artifacts/$ARCHIVE_NAME"
          shasum -a 256 "artifacts/$ARCHIVE_NAME" > "artifacts/$ARCHIVE_NAME.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SHORT_SHA }}
          path: |
            artifacts/${{ env.ARCHIVE_NAME }}
            artifacts/${{ env.ARCHIVE_NAME }}.sha256
          if-no-files-found: error
      - name: Prepare smoke test logs
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          for file in cli-smoke-test.log gui-stdout.log gui-stderr.log gui-app.log gui-search.png gui-search-state.json; do
            if [ ! -f "$file" ]; then
              printf 'not generated\n' > "$file"
            fi
          done
      - name: Upload smoke test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SHORT_SHA }}-smoke-logs
          path: |
            cli-smoke-test.log
            gui-stdout.log
            gui-stderr.log
            gui-app.log
            gui-search.png
            gui-search-state.json
          if-no-files-found: warn
      - name: Upload search screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SHORT_SHA }}-search-screenshot
          path: gui-search.png
          if-no-files-found: warn
      - name: Upload search UI state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ env.SHORT_SHA }}-search-ui-state
          path: gui-search-state.json
          if-no-files-found: warn
