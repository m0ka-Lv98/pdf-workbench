name: Build macOS application

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/build-macos.yml"
      - "packaging/pdf_workbench_macos.spec"
      - "packaging/pdf_workbench_onedir.spec"
      - "packaging/pdf_workbench_onefile.spec"
      - "src/**"
      - "tests/**"
      - "pyproject.toml"

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    env:
      PR_SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Set build metadata
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${PR_SOURCE_SHA::7}"
          echo "SHORT_SHA=$short_sha" >> "$GITHUB_ENV"
          echo "ARCHIVE_NAME=PDF-Workbench-macOS-arm64-$short_sha.zip" >> "$GITHUB_ENV"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/pdf_workbench
      - run: pytest --cov=pdf_workbench
        env:
          QT_QPA_PLATFORM: offscreen
      - name: Build macOS app
        run: pyinstaller packaging/pdf_workbench_macos.spec --noconfirm --clean
      - name: Verify bundled resources
        shell: bash
        run: |
          set -euo pipefail
          find "dist/PDF Workbench.app" -name "workbench_light.qss" -print -quit | grep -q .
          find "dist/PDF Workbench.app" -name "workbench_dark.qss" -print -quit | grep -q .
          find "dist/PDF Workbench.app" -name "search.svg" -print -quit | grep -q .
          find "dist/PDF Workbench.app" -name "document.svg" -print -quit | grep -q .
      - name: Smoke test packaged UI
        shell: bash
        run: |
          set -euo pipefail

          executable="dist/PDF Workbench.app/Contents/MacOS/PDF Workbench"
          stdout_log="gui-stdout.log"
          stderr_log="gui-stderr.log"
          screenshot_path="gui-search-light.png"
          ui_state_path="gui-search-light.json"

          rm -f "$stdout_log" "$stderr_log" "$screenshot_path" "$ui_state_path"

          APP_EXIT_CODE=$(PDF_WORKBENCH_BUILD_SHA="$SHORT_SHA" \
            python - <<'PY'
          import os
          import subprocess

          command = [
              "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench",
              os.path.join(os.getcwd(), "tests/fixtures/real-search-english.pdf"),
              "--skip-recovery-prompt",
              "--window-size",
              "1100x800",
              "--color-scheme",
              "light",
              "--open-search",
              "--search-query",
              "Alpha",
              "--screenshot-path",
              "gui-search-light.png",
              "--ui-state-path",
              "gui-search-light.json",
              "--quit-after-ms",
              "9000",
          ]
          with open("gui-stdout.log", "w", encoding="utf-8") as stdout, open(
              "gui-stderr.log", "w", encoding="utf-8"
          ) as stderr:
              completed = subprocess.run(
                  command,
                  stdout=stdout,
                  stderr=stderr,
                  timeout=20,
                  check=False,
                  env=os.environ.copy(),
              )
          print(str(completed.returncode))
          PY
          )
          test "$APP_EXIT_CODE" -eq 0
          test -f "$screenshot_path"
          test -f "$ui_state_path"
          if grep -q "QThread: Destroyed while thread is still running" "$stdout_log" "$stderr_log"; then
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("gui-search-light.json").read_text(encoding="utf-8"))
          assert payload["active_theme"] == "light"
          assert payload["requested_window_size"] == [1100, 800]
          assert payload["actual_window_size"] == [1100, 800]
          assert payload["search_counter"] == "1 / 2"
          assert payload["visible_controls"]["search_surface"] is True
          assert payload["main_toolbar_geometry"][2] > 0
          assert 52 <= payload["main_toolbar_geometry"][3] <= 56
          assert payload["search_row_geometry"][3] <= 56
          assert payload["search_surface_geometry"][2] > 0
          assert payload["page_input_geometry"][2] > 0
          assert payload["zoom_control_geometry"][2] > 0
          PY
      - name: Smoke test packaged page mutation
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          from pathlib import Path

          from pypdf import PdfWriter

          writer = PdfWriter()
          for _ in range(3):
              writer.add_blank_page(width=200, height=200)
          with Path("page-mutation-smoke-input.pdf").open("wb") as stream:
              writer.write(stream)
          PY

          "dist/PDF Workbench.app/Contents/MacOS/PDF Workbench" \
            --page-mutation-smoke-input page-mutation-smoke-input.pdf \
            --page-mutation-smoke-result page-mutation-smoke-result.json

          test -f page-mutation-smoke-result.json
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("page-mutation-smoke-result.json").read_text(encoding="utf-8"))
          assert payload["duplicate"] == "success"
          assert payload["undo_duplicate"] == "success"
          assert payload["delete"] == "success"
          assert payload["undo_delete"] == "success"
          assert payload["all_page_render"] == "success"
          assert payload["initial_page_count"] == 3
          assert payload["after_duplicate_page_count"] == 4
          assert payload["after_undo_duplicate_page_count"] == 3
          assert payload["after_delete_page_count"] == 2
          assert payload["after_undo_delete_page_count"] == 3
          assert payload["working_copy_structure_restored"] is True
          assert payload["source_unchanged"] is True
          PY
      - name: Capture UI review screenshots
        shell: bash
        env:
          QT_QPA_PLATFORM: offscreen
        run: |
          set -euo pipefail
          review_dir="ui-review"
          mkdir -p "$review_dir"

          capture_ui() {
            local stem="$1"
            shift
            python -m pdf_workbench "$@" \
              --skip-recovery-prompt \
              --screenshot-path "$review_dir/$stem.png" \
              --ui-state-path "$review_dir/$stem.json" \
              --quit-after-ms 1800
          }

          capture_ui "light-empty-1100x800" \
            --window-size 1100x800 \
            --color-scheme light

          capture_ui "light-document-1100x800" \
            tests/fixtures/real-search-english.pdf \
            --window-size 1100x800 \
            --color-scheme light

          capture_ui "light-search-1100x800" \
            tests/fixtures/real-search-english.pdf \
            --window-size 1100x800 \
            --color-scheme light \
            --open-search \
            --search-query Alpha

          capture_ui "dark-document-1100x800" \
            tests/fixtures/real-search-english.pdf \
            --window-size 1100x800 \
            --color-scheme dark

          capture_ui "dark-search-1100x800" \
            tests/fixtures/real-search-english.pdf \
            --window-size 1100x800 \
            --color-scheme dark \
            --open-search \
            --search-query Alpha

          capture_ui "light-document-800x600" \
            tests/fixtures/real-search-english.pdf \
            --window-size 800x600 \
            --color-scheme light

          capture_ui "light-search-800x600" \
            tests/fixtures/real-search-english.pdf \
            --window-size 800x600 \
            --color-scheme light \
            --open-search \
            --search-query Alpha

          capture_recovery_dialog() {
            local stem="$1"
            local size="$2"
            local scheme="$3"
            python scripts/capture_recovery_dialog.py \
              --window-size "$size" \
              --color-scheme "$scheme" \
              --output-png "$review_dir/$stem.png" \
              --output-json "$review_dir/$stem.json"
          }

          capture_recovery_dialog "light-recovery-dialog-1100x800" "1100x800" "light"
          capture_recovery_dialog "dark-recovery-dialog-1100x800" "1100x800" "dark"
          capture_recovery_dialog "light-recovery-dialog-800x600" "800x600" "light"

          capture_source_change() {
            local stem="$1"
            local size="$2"
            local scheme="$3"
            python scripts/capture_source_change_review.py \
              --fixture-pdf tests/fixtures/real-search-english.pdf \
              --window-size "$size" \
              --color-scheme "$scheme" \
              --output-png "$review_dir/$stem.png" \
              --output-json "$review_dir/$stem.json"
          }

          capture_source_change "light-source-changed-1100x800" "1100x800" "light"
          capture_source_change "dark-source-changed-1100x800" "1100x800" "dark"
          capture_source_change "light-source-changed-800x600" "800x600" "light"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pdf-workbench-ui-review-${{ env.SHORT_SHA }}
          path: |
            ui-review/light-empty-1100x800.png
            ui-review/light-empty-1100x800.json
            ui-review/light-document-1100x800.png
            ui-review/light-document-1100x800.json
            ui-review/light-search-1100x800.png
            ui-review/light-search-1100x800.json
            ui-review/dark-document-1100x800.png
            ui-review/dark-document-1100x800.json
            ui-review/dark-search-1100x800.png
            ui-review/dark-search-1100x800.json
            ui-review/light-document-800x600.png
            ui-review/light-document-800x600.json
            ui-review/light-search-800x600.png
            ui-review/light-search-800x600.json
            ui-review/light-recovery-dialog-1100x800.png
            ui-review/light-recovery-dialog-1100x800.json
            ui-review/dark-recovery-dialog-1100x800.png
            ui-review/dark-recovery-dialog-1100x800.json
            ui-review/light-recovery-dialog-800x600.png
            ui-review/light-recovery-dialog-800x600.json
            ui-review/light-source-changed-1100x800.png
            ui-review/light-source-changed-1100x800.json
            ui-review/dark-source-changed-1100x800.png
            ui-review/dark-source-changed-1100x800.json
            ui-review/light-source-changed-800x600.png
            ui-review/light-source-changed-800x600.json
          if-no-files-found: error
      - name: Verify UI review screenshots
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import hashlib
          import math
          from pathlib import Path

          from PySide6.QtGui import QColor, QImage

          review_dir = Path("ui-review")
          expected_sizes = {
              "light-empty-1100x800": [1100, 800],
              "light-document-1100x800": [1100, 800],
              "light-search-1100x800": [1100, 800],
              "dark-document-1100x800": [1100, 800],
              "dark-search-1100x800": [1100, 800],
              "light-document-800x600": [800, 600],
              "light-search-800x600": [800, 600],
              "light-recovery-dialog-1100x800": [1100, 800],
              "dark-recovery-dialog-1100x800": [1100, 800],
              "light-recovery-dialog-800x600": [800, 600],
              "light-source-changed-1100x800": [1100, 800],
              "dark-source-changed-1100x800": [1100, 800],
              "light-source-changed-800x600": [800, 600],
          }

          def center_y(rect: list[int]) -> int:
              return rect[1] + rect[3] // 2

          def contains_rect(outer: list[int], inner: list[int]) -> bool:
              return (
                  inner[0] >= outer[0]
                  and inner[1] >= outer[1]
                  and inner[0] + inner[2] <= outer[0] + outer[2]
                  and inner[1] + inner[3] <= outer[1] + outer[3]
              )

          def color_distance(color: QColor, expected: tuple[int, int, int]) -> float:
              return math.sqrt(
                  (color.red() - expected[0]) ** 2
                  + (color.green() - expected[1]) ** 2
                  + (color.blue() - expected[2]) ** 2
              )

          def unique_colors(image: QImage, limit: int = 256) -> int:
              colors: set[tuple[int, int, int, int]] = set()
              for y in range(image.height()):
                  for x in range(image.width()):
                      color = image.pixelColor(x, y)
                      colors.add((color.red(), color.green(), color.blue(), color.alpha()))
                      if len(colors) >= limit:
                          return len(colors)
              return len(colors)

          def brightness(image: QImage, rect: list[int]) -> float:
              x, y, width, height = rect
              total = 0.0
              samples = 0
              for yy in range(y, y + height):
                  for xx in range(x, x + width):
                      color = image.pixelColor(xx, yy)
                      total += (color.red() + color.green() + color.blue()) / 3.0
                      samples += 1
              return 0.0 if samples == 0 else total / samples

          def assert_edge_has_accent(
              stem: str,
              image: QImage,
              rect: list[int],
              expected: tuple[int, int, int],
          ) -> None:
              x, y, width, height = rect
              samples = {
                  "top": [
                      (x + width // 2 + dx, yy)
                      for yy in (y, y + 1)
                      for dx in (-2, -1, 0, 1, 2)
                  ],
                  "bottom": [
                      (x + width // 2 + dx, yy)
                      for yy in (y + height - 2, y + height - 1)
                      for dx in (-2, -1, 0, 1, 2)
                  ],
                  "left": [
                      (xx, y + height // 2 + dy)
                      for xx in (x, x + 1)
                      for dy in (-2, -1, 0, 1, 2)
                  ],
                  "right": [
                      (xx, y + height // 2 + dy)
                      for xx in (x + width - 2, x + width - 1)
                      for dy in (-2, -1, 0, 1, 2)
                  ],
              }
              for side, points in samples.items():
                  distances: list[tuple[tuple[int, int], tuple[int, int, int], float]] = []
                  matched = False
                  for px, py in points:
                      if 0 <= px < image.width() and 0 <= py < image.height():
                          color = image.pixelColor(px, py)
                          rgb = (color.red(), color.green(), color.blue())
                          distance = color_distance(color, expected)
                          distances.append(((px, py), rgb, distance))
                          if distance <= 28:
                              matched = True
                  assert matched, (
                      f"{stem} {side} expected={expected} "
                      f"samples={distances}"
                  )

          payloads: dict[str, dict[str, object]] = {}
          images: dict[str, QImage] = {}
          for stem, expected_size in expected_sizes.items():
              image = QImage(str(review_dir / f"{stem}.png"))
              assert not image.isNull(), stem
              assert [image.width(), image.height()] == expected_size, stem
              assert unique_colors(image) > 32, stem
              images[stem] = image
              payload = json.loads((review_dir / f"{stem}.json").read_text(encoding="utf-8"))
              payloads[stem] = payload
              assert payload["requested_window_size"] == expected_size, stem
              assert payload["actual_window_size"] == expected_size, stem

          compact = payloads["light-document-800x600"]
          assert compact["window_minimum_size_hint"][0] <= 800
          assert 56 <= compact["page_input_geometry"][2] <= 64
          assert 90 <= compact["zoom_control_geometry"][2] <= 104
          assert compact["main_toolbar_geometry"][2] > 0
          assert compact["visible_controls"]["rotate"] is True

          for stem in ("light-search-1100x800", "dark-search-1100x800"):
              payload = payloads[stem]
              search_surface = payload["search_surface_window_geometry"]
              input_surface = payload["search_input_surface_geometry"]
              input_surface_border = payload["search_input_surface_border_geometry"]
              input_surface_size = payload["search_input_surface_size"]
              first_page = payload["first_page_window_geometry"]
              assert search_surface[2] > 0 and search_surface[3] > 0
              assert input_surface[2] > 0 and input_surface[3] == 40
              assert input_surface_border[2] > 0 and input_surface_border[3] == 40
              assert input_surface == input_surface_border
              assert input_surface_size == [360, 40]
              assert first_page[2] > 0 and first_page[3] > 0
              assert first_page[1] >= search_surface[1] + search_surface[3] + 8
              assert contains_rect(search_surface, input_surface)

              icon = payload["search_icon_geometry"]
              line_edit = payload["search_line_edit_geometry"]
              clear_button = payload["search_clear_button_geometry"]
              assert icon[3] <= 18
              assert line_edit[3] <= 28
              assert clear_button[3] <= 26
              assert abs(center_y(icon) - center_y(input_surface)) <= 1
              assert abs(center_y(line_edit) - center_y(input_surface)) <= 1
              assert abs(center_y(clear_button) - center_y(input_surface)) <= 1
              assert abs(center_y(icon) - center_y(line_edit)) <= 1
              assert contains_rect(input_surface, icon)
              assert contains_rect(input_surface, line_edit)
              assert contains_rect(input_surface, clear_button)

          light_search = payloads["light-search-1100x800"]
          assert light_search["search_query"] == "Alpha"
          assert light_search["search_counter"] == "1 / 2"
          assert light_search["status_message_text"] == "準備完了"
          assert light_search["native_status_message"] == ""
          assert light_search["status_left_geometry"][2] > 0
          assert light_search["status_icon_geometry"][2] > 0
          assert (
              light_search["status_message_geometry"][0]
              > light_search["status_icon_geometry"][0] + light_search["status_icon_geometry"][2]
          )

          compact_search = payloads["light-search-800x600"]
          assert compact_search["search_query"] == "Alpha"
          assert compact_search["search_counter"] == "1 / 2"
          assert compact_search["search_input_surface_geometry"][3] == 40
          assert compact_search["search_input_surface_border_geometry"][3] == 40
          assert compact_search["search_input_surface_size"] == [360, 40]
          assert contains_rect(
              compact_search["search_surface_window_geometry"],
              compact_search["search_input_surface_geometry"],
          )

          for stem in (
              "light-recovery-dialog-1100x800",
              "dark-recovery-dialog-1100x800",
              "light-recovery-dialog-800x600",
          ):
              payload = payloads[stem]
              assert payload["candidate_count"] == 3
              assert payload["recoverable_count"] == 1
              assert payload["discardable_count"] == 2
              assert payload["recover_enabled"] is False
              assert payload["discard_enabled"] is True
              assert payload["later_visible"] is True
              assert payload["fits_in_review_viewport"] is True
              assert payload["tree_geometry"][2] > 0 and payload["tree_geometry"][3] > 0
              assert (
                  payload["button_row_geometry"][2] > 0
                  and payload["button_row_geometry"][3] > 0
              )
              assert payload["unique_color_count"] > 32
              assert (
                  payload["dialog_geometry_in_viewport"][2] > 0
                  and payload["dialog_geometry_in_viewport"][3] > 0
              )

          compact_recovery = payloads["light-recovery-dialog-800x600"]
          assert compact_recovery["dialog_geometry_in_viewport"][2] <= 800
          assert compact_recovery["dialog_geometry_in_viewport"][3] <= 600
          assert compact_recovery["visible_columns"] == ["対象", "ファイル", "元の場所", "状態"]
          assert compact_recovery["hidden_columns"] == ["最終更新", "サイズ"]
          assert compact_recovery["horizontal_scrollbar_visible"] is False
          assert compact_recovery["horizontal_scrollbar_maximum"] == 0

          light_recovery = payloads["light-recovery-dialog-1100x800"]
          dark_recovery = payloads["dark-recovery-dialog-1100x800"]
          assert light_recovery["visible_columns"] == [
              "対象",
              "ファイル",
              "元の場所",
              "最終更新",
              "状態",
              "サイズ",
          ]
          assert light_recovery["hidden_columns"] == []
          assert light_recovery["horizontal_scrollbar_maximum"] == 0
          assert dark_recovery["visible_columns"] == [
              "対象",
              "ファイル",
              "元の場所",
              "最終更新",
              "状態",
              "サイズ",
          ]
          assert dark_recovery["hidden_columns"] == []
          assert dark_recovery["horizontal_scrollbar_maximum"] == 0
          assert (
              light_recovery["canvas_digest"]
              != dark_recovery["canvas_digest"]
          )
          assert (
              light_recovery["dialog_digest"]
              != dark_recovery["dialog_digest"]
          )
          assert (
              dark_recovery["dialog_brightness"]
              < light_recovery["dialog_brightness"]
          )
          assert (
              abs(light_recovery["tree_brightness"] - light_recovery["dialog_brightness"]) > 1.0
          )
          assert (
              abs(light_recovery["button_row_brightness"] - light_recovery["dialog_brightness"])
              > 1.0
          )

          assert_edge_has_accent(
              "light-search-1100x800",
              images["light-search-1100x800"],
              light_search["search_input_surface_border_geometry"],
              (37, 99, 235),
          )
          assert_edge_has_accent(
              "dark-search-1100x800",
              images["dark-search-1100x800"],
              payloads["dark-search-1100x800"]["search_input_surface_border_geometry"],
              (96, 165, 250),
          )

          for stem in (
              "light-source-changed-1100x800",
              "dark-source-changed-1100x800",
              "light-source-changed-800x600",
          ):
              payload = payloads[stem]
              assert payload["source_change_banner_visible"] is True
              assert payload["source_status"] == "modified"
              assert "[外部変更]" in payload["tab_title"]
              assert payload["save_action_enabled"] is True
              assert payload["save_as_action_enabled"] is True
              assert payload["source_change_banner_fits_in_viewport"] is True
              assert payload["source_change_button_clipping"] is False
              assert payload["source_change_horizontal_overflow"] is False
              assert payload["source_change_banner_geometry"][2] > 0
              assert payload["source_change_banner_geometry"][3] > 0
              assert payload["source_change_message_geometry"][2] > 0
              assert payload["source_change_save_as_geometry"][2] > 0
              assert payload["source_change_recheck_geometry"][2] > 0
              assert payload["source_change_later_geometry"][2] > 0

          light_source_changed = payloads["light-source-changed-1100x800"]
          dark_source_changed = payloads["dark-source-changed-1100x800"]
          assert brightness(
              images["dark-source-changed-1100x800"],
              dark_source_changed["source_change_banner_geometry"],
          ) < brightness(
              images["light-source-changed-1100x800"],
              light_source_changed["source_change_banner_geometry"],
          )
          PY
      - name: Package app bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/PDF Workbench.app" \
            "artifacts/$ARCHIVE_NAME"
          shasum -a 256 "artifacts/$ARCHIVE_NAME" > "artifacts/$ARCHIVE_NAME.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: pdf-workbench-macos-arm64-${{ env.SHORT_SHA }}
          path: |
            artifacts/${{ env.ARCHIVE_NAME }}
            artifacts/${{ env.ARCHIVE_NAME }}.sha256
            gui-search-light.png
            gui-search-light.json
            gui-stdout.log
            gui-stderr.log
            page-mutation-smoke-input.pdf
            page-mutation-smoke-result.json
          if-no-files-found: error
