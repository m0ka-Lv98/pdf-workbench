name: Bug report
description: 再現可能な不具合を報告する
title: "[Bug]: "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 再現手順
      placeholder: "1. ...\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期待結果
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 環境
      placeholder: "macOS/Windows、アプリバージョン、PDFの特徴"
    validations:
      required: true
