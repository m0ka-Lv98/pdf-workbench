name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt runtime dependencies on Ubuntu
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libegl1 libopengl0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src/pdf_workbench
      - name: Run test suite
        if: runner.os != 'macOS' || matrix.python-version != '3.13'
        run: pytest --cov=pdf_workbench
      - name: Record macOS Python 3.13 environment
        if: runner.os == 'macOS' && matrix.python-version == '3.13'
        run: |
          python --version
          python -m pip --version
          python -m pip show pytest pytest-cov coverage pytest-qt PySide6 pypdfium2 pikepdf pypdf
          python -m pip freeze
      - name: Diagnose tests without coverage on macOS Python 3.13
        if: runner.os == 'macOS' && matrix.python-version == '3.13'
        timeout-minutes: 5
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          python -m pytest \
            -vv \
            --durations=50 \
            -o faulthandler_timeout=120 \
            2>&1 | tee pytest-macos-py313-no-coverage.log
      - name: Diagnose tests with coverage on macOS Python 3.13
        if: runner.os == 'macOS' && matrix.python-version == '3.13'
        timeout-minutes: 10
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          python -m coverage erase
          python -m pytest \
            -vv \
            --durations=50 \
            -o faulthandler_timeout=120 \
            --cov=pdf_workbench \
            2>&1 | tee pytest-macos-py313-coverage.log
      - name: Upload macOS Python 3.13 pytest diagnostics
        if: always() && runner.os == 'macOS' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: macos-py313-pytest-diagnostics-${{ github.run_attempt }}
          path: |
            pytest-macos-py313-no-coverage.log
            pytest-macos-py313-coverage.log
          if-no-files-found: warn
